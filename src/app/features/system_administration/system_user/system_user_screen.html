<p-card styleClass="rounded-[12px] shadow-sm border border-slate-100 sa-card sa-card--table overflow-hidden">
  <ng-template pTemplate="content">
    <!-- Filters -->
    <div class="px-6 pt-6 pb-4 border-b border-slate-100">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div class="flex flex-1 gap-3 w-full">
          <div class="relative flex-1">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
              <lucide-icon [img]="icons.search" [size]="16"></lucide-icon>
            </span>
            <input
              type="text"
              [(ngModel)]="searchTerm"
              class="w-full pl-10 pr-3 py-2.5 rounded-lg border border-slate-200 bg-white outline-none transition-all focus:ring-2 focus:ring-evn-blue/15 focus:border-evn-blue/40"
              placeholder="Tìm kiếm theo họ tên hoặc email..."
            />
          </div>

          <p-select
            [options]="departmentOptions"
            [(ngModel)]="selectedDepartment"
            optionLabel="label"
            optionValue="value"
            [style]="{ minWidth: '220px' }"
          />
        </div>
      </div>
    </div>

    <!-- Table + footer pinned bottom -->
    <div class="sa-table-container">
      <p-table [value]="filteredUsers" styleClass="sa-table" [tableStyle]="{ width: '100%' }" [rowHover]="true">
        <ng-template pTemplate="header">
          <tr class="sa-table-head">
            <th class="px-6 py-4">Họ tên</th>
            <th class="px-6 py-4">Email</th>
            <th class="px-6 py-4">Phòng ban</th>
            <th class="px-6 py-4">Đơn vị công tác</th>
            <th class="px-6 py-4">Quyền hạn</th>
            <th class="px-6 py-4 text-center">Thao tác</th>
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-row>
          <tr class="sa-row">
            <td class="px-6 py-4">
              <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-[10px] font-bold text-slate-700">
                  {{ row.initials }}
                </div>
                <span class="font-semibold text-sm text-slate-800">{{ row.name }}</span>
              </div>
            </td>
            <td class="px-6 py-4 text-sm text-slate-600">{{ row.email }}</td>
            <td class="px-6 py-4 text-sm">{{ row.department }}</td>
            <td class="px-6 py-4 text-sm">{{ row.orgUnit }}</td>
            <td class="px-6 py-4">
              <span
                class="sa-role"
                [class.sa-role--admin]="row.role === 'ADMIN'"
                [class.sa-role--manager]="row.role === 'MANAGER'"
                [class.sa-role--user]="row.role === 'USER'"
              >
                {{ roleLabel(row.role) }}
              </span>
            </td>
            <td class="px-6 py-4">
              <div class="flex justify-center gap-2">
                <button
                  type="button"
                  class="w-9 h-9 rounded-lg grid place-items-center text-evn-blue hover:bg-evn-blue/10 transition-colors border border-transparent"
                  (click)="editUser(row)"
                >
                  <lucide-icon [img]="icons.edit" [size]="18"></lucide-icon>
                </button>
                <button
                  type="button"
                  class="w-9 h-9 rounded-lg grid place-items-center text-slate-500 hover:bg-slate-100 transition-colors border border-transparent"
                  (click)="toggleLock(row)"
                >
                  <lucide-icon [img]="row.locked ? icons.lock : icons.unlock" [size]="18"></lucide-icon>
                </button>
              </div>
            </td>
          </tr>
        </ng-template>
      </p-table>

      <div class="sa-footer px-6 py-4 bg-slate-50 border-t border-slate-100 flex flex-col sm:flex-row justify-between items-center gap-4">
        <p class="text-sm text-slate-500">Hiển thị 1-{{ filteredUsers.length }} của {{ users.length }} người dùng</p>
        <div class="flex items-center gap-1">
          <button class="sa-page-btn" disabled>‹</button>
          <button class="sa-page-btn sa-page-btn--active">1</button>
          <button class="sa-page-btn" disabled>2</button>
          <button class="sa-page-btn" disabled>3</button>
          <span class="px-2 text-slate-400 text-sm">...</span>
          <button class="sa-page-btn" disabled>›</button>
        </div>
      </div>
    </div>
  </ng-template>
</p-card>
